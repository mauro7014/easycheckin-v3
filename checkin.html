<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Check-in Huésped</title>
</head>
<body>
<h2>Check-in Huésped</h2>
<input type="text" id="guest_name" placeholder="Nombre completo">
<input type="text" id="guest_dni" placeholder="DNI">
<button id="checkin">Hacer Check-in</button>

<script>
const urlParams = new URLSearchParams(window.location.search);
const qr = urlParams.get('qr'); // ID del propietario / departamento

document.getElementById('checkin').onclick = async () => {
  const guest_name = document.getElementById('guest_name').value;
  const guest_dni = document.getElementById('guest_dni').value;

  const res = await fetch('/api/checkin', {
    method: 'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({qr, guest_name, guest_dni})
  });
  const data = await res.json();
  alert(data.message);
};
</script>
</body>
</html>
