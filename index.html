<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyCheckin | Acceso</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1 style="color:#2563EB;">EasyCheckIn</h1>

        <h1 id="auth-title">Crea tu cuenta</h1>
        <p class="subtitle" id="auth-subtitle">
            Gestioná tus check-ins de forma profesional
        </p>

        <div id="auth-form">
            <input type="text" id="full_name" placeholder="Nombre completo">
            <input type="email" id="email" placeholder="Correo electrónico">
            <input type="password" id="password" placeholder="Contraseña">

            <button id="btn-auth-action">Registrarse</button>

            <p id="toggle-auth-mode" style="cursor:pointer;">
                ¿Ya tenés cuenta? Iniciá sesión
            </p>
        </div>
    </div>

    <footer style="text-align:center; margin-top:40px;">
        Powered by NeoFlux
    </footer>

    <!-- ✅ SUPABASE BIEN CARGADO -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- CONFIG -->
    <script src="js/config.js"></script>

    <!-- LOGICA -->
    <script src="js/auth.js"></script>

</body>
</html>
